<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste</title>

<style>
body {
  margin: 0;
  background: #e9e6df;
  font-family: sans-serif;
}

/* TIMER */
.timer {
  position: fixed;
  top: 20px;
  right: 30px;
  font-size: 14px;
  color: rgba(0,0,0,0.6);
}

/* PEÇA */
.image-container {
  position: absolute;
  cursor: grab;
}

.image-container:active {
  cursor: grabbing;
}

/* WRAPPER */
.piece {
  display: inline-block;
  transform-origin: center center;
}

/* IMAGEM */
.dragme {
  display: block;
  pointer-events: none;
}

/* BOTÃO */
.rotate-button {
  position: absolute;
  bottom: -8px;
  right: -8px;
  background: rgba(0,0,0,0.6);
  color: white;
  border-radius: 50%;
  padding: 3px 6px;
  font-size: 11px;
  cursor: pointer;
}

/* TUTORIAL */
.tutorial {
  position: fixed;
  bottom: 15px;
  left: 20px;
  font-size: 12px;
  color: rgba(0,0,0,0.5);
  line-height: 1.6;
  pointer-events: none;
  user-select: none;
  background: rgba(255,255,255,0.4);
  padding: 8px 10px;
  border-radius: 8px;
  backdrop-filter: blur(4px);
}

.key {
  background: rgba(0,0,0,0.1);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
}

.next-btn {
  position: fixed;
  bottom: 20px;
  right: 30px;
  padding: 12px 20px;
  background: #bfb7a8;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="timer" id="timer">00:00</div>

<!-- PEÇAS -->
<div class="image-container" style="top:64px; left:334px;">
  <div class="piece">
    <img src="./page1Images/homi1.PNG" class="dragme" style="width:82px;">
  </div>
  <div class="rotate-button">↻</div>
</div>

<div class="image-container" style="top:63px; left:497px;">
  <div class="piece">
    <img src="./page1Images/homi2.PNG" class="dragme" style="width:105px;">
  </div>
  <div class="rotate-button">↻</div>
</div>

<div class="image-container" style="top:58px; left:667px;">
  <div class="piece">
    <img src="./page1Images/homi3.PNG" class="dragme" style="width:160px;">
  </div>
  <div class="rotate-button">↻</div>
</div>

<div class="image-container" style="top:63px; left:854px;">
  <div class="piece">
    <img src="./page1Images/homi4.PNG" class="dragme" style="width:112px;">
  </div>
  <div class="rotate-button">↻</div>
</div>

<div class="image-container" style="top:79px; left:1143px;">
  <div class="piece">
    <img src="./page1Images/homi5.PNG" class="dragme" style="width:81px;">
  </div>
  <div class="rotate-button">↻</div>
</div>

<div class="image-container" style="top:66px; left:1021px;">
  <div class="piece">
    <img src="./page1Images/homi6.PNG" class="dragme" style="width:81px;">
  </div>
  <div class="rotate-button">↻</div>
</div>

<!-- TUTORIAL -->
<div class="tutorial">
  <div>🖱️ Arraste para mover</div>
  <div>↻ Clique para girar</div>
  <div><span class="key">Shift</span> + clique ↺ gira ao contrário</div>
</div>

<button class="next-btn" onclick="nextPage()">Continuar</button>

<script>
let startTime=null, timerStarted=false;

function startTimer(){
  if(!timerStarted){
    startTime = Date.now();
    timerStarted = true;
  }
}

setInterval(()=>{
  if(!timerStarted) return;

  const t = Date.now()-startTime;
  const s = Math.floor(t/1000);

  document.getElementById("timer").innerText =
    `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
},1000);

/* DRAG */
let active=null, shiftX=0, shiftY=0;

document.querySelectorAll('.image-container').forEach(el=>{
  el.addEventListener('mousedown', e=>{
    if(e.target.closest('.rotate-button')) return;

    active = el;

    const rect = el.getBoundingClientRect();

    shiftX = e.clientX - rect.left;
    shiftY = e.clientY - rect.top;

    startTimer();

    document.addEventListener('mousemove', move);
  });
});

function move(e){
  if(!active) return;

  active.style.left = (e.clientX - shiftX) + 'px';
  active.style.top  = (e.clientY - shiftY) + 'px';
}

document.addEventListener('mouseup', ()=>{
  active=null;
  document.removeEventListener('mousemove', move);
});

/* ROTAÇÃO */
document.querySelectorAll('.rotate-button').forEach(btn=>{
  btn.addEventListener('click', e=>{
    e.stopPropagation();

    const piece = e.target.closest('.image-container').querySelector('.piece');

    let r = parseFloat(piece.dataset.r || 0);

    if (e.shiftKey) r -= 15;
    else r += 15;

    piece.dataset.r = r;
    piece.style.transform = `rotate(${r}deg)`;

    startTimer();
  });
});

/* SHIFT muda ícone */
document.addEventListener('keydown', e=>{
  if (e.key === 'Shift') {
    document.querySelectorAll('.rotate-button').forEach(b=>b.textContent='↺');
  }
});

document.addEventListener('keyup', e=>{
  if (e.key === 'Shift') {
    document.querySelectorAll('.rotate-button').forEach(b=>b.textContent='↻');
  }
});

function nextPage() {
  window.location.href = "page2.html";
}
</script>

</body>
</html>
