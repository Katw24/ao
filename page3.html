<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Armar Objetos</title>

<style>
body {
  margin: 0;
  background: #e9e6df;
  font-family: sans-serif;
}

/* TIMER */
.timer {
  position: fixed;
  top: 20px;
  right: 30px;
  font-size: 14px;
  color: rgba(0,0,0,0.6);
}

/* PEÇA */
.image-container {
  position: absolute;
  cursor: grab;
}

.image-container:active {
  cursor: grabbing;
}

/* WRAPPER */
.piece {
  display: inline-block;
  transform-origin: center center;
}

/* IMAGEM */
.dragme {
  display: block;
  pointer-events: none;
}

/* ROTATE */
.rotate-button {
  position: absolute;
  bottom: -8px;
  right: -8px;
  background: rgba(0,0,0,0.6);
  color: white;
  border-radius: 50%;
  padding: 3px 6px;
  font-size: 11px;
  cursor: pointer;
}

/* 🔥 TUTORIAL VISUAL */
.tutorial {
  position: fixed;
  bottom: 15px;
  left: 20px;
  font-size: 12px;
  color: rgba(0,0,0,0.5);
  line-height: 1.6;
  pointer-events: none;
  user-select: none;
  background: rgba(255,255,255,0.4);
  padding: 8px 10px;
  border-radius: 8px;
  backdrop-filter: blur(4px);
  animation: fadeIn 0.5s ease;
  transition: opacity 0.5s ease;
}

.tutorial div {
  display: flex;
  align-items: center;
  gap: 6px;
}

.key {
  background: rgba(0,0,0,0.1);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
}

.next-btn {
  position: fixed;
  bottom: 20px;
  right: 30px;
  padding: 12px 20px;
  background: #bfb7a8;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.next-btn:hover {
  background: #a89f8f;
}

/* animação */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="timer" id="timer">00:00</div>

<!-- PEÇAS -->
<div class="image-container" style="top:151px; left:985px;" data-width="234">
  <div class="piece"></div>
  <img src="./page3Images/fante1.png" class="dragme" data-rotation="0" style="width: 234px;">
  <div class="rotate-button">↻</div>
</div>

<div class="image-container" style="top:55px; left:922px;" data-width="90">
  <img src="./page3Images/fante2.png" class="dragme" data-rotation="2" style="width: 90px;">
  <div class="rotate-button">↻</div>
</div>

<div class="image-container" style="top:104px; left:752px;" data-width="172">
  <img src="./page3Images/fante3.png" class="dragme" data-rotation="0" style="width: 172px;">
  <div class="rotate-button">↻</div>
</div>

<div class="image-container" style="top:118px; left:585px;" data-width="147">
  <img src="./page3Images/fante4.png" class="dragme" data-rotation="0" style="width: 147px;">
  <div class="rotate-button">↻</div>
</div>

<div class="image-container" style="top:77px; left:423px;" data-width="140">
  <img src="./page3Images/fante5.png" class="dragme" data-rotation="0" style="width: 140px;">
  <div class="rotate-button">↻</div>
</div>

<div class="image-container" style="top:48px; left:198px;" data-width="180">
  <img src="./page3Images/fante6.png" class="dragme" data-rotation="0" style="width: 180px;">
  <div class="rotate-button">↻</div>
</div>

<!-- 🔥 TUTORIAL -->
<div class="tutorial" id="tutorial">
  <div>🖱️ Arraste para mover</div>
  <div>↻ Clique para girar</div>
  <div><span class="key">Shift</span> + clique ↺ gira ao contrário</div>
</div>


<button class="next-btn" onclick="nextPage()">Continuar</button>

<script>
/* TIMER */
let startTime=null, timerStarted=false;

function startTimer(){
  if(!timerStarted){
    startTime = Date.now();
    timerStarted = true;
  }
}

setInterval(()=>{
  if(!timerStarted) return;

  const t = Date.now()-startTime;
  const s = Math.floor(t/1000);

  document.getElementById("timer").innerText =
    `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
},1000);

/* DRAG */
let active=null, shiftX=0, shiftY=0;

document.querySelectorAll('.image-container').forEach(el=>{
  el.addEventListener('mousedown', e=>{
    if(e.target.closest('.rotate-button')) return;

    active = el;

    const rect = el.getBoundingClientRect();

    shiftX = e.clientX - rect.left;
    shiftY = e.clientY - rect.top;

    startTimer();

    document.addEventListener('mousemove', move);
  });
});

function move(e){
  if(!active) return;

  active.style.left = (e.clientX - shiftX) + 'px';
  active.style.top  = (e.clientY - shiftY) + 'px';
}

document.addEventListener('mouseup', ()=>{
  active=null;
  document.removeEventListener('mousemove', move);
});

/* ROTAÇÃO */
document.querySelectorAll('.rotate-button').forEach(btn=>{
  btn.addEventListener('click', e=>{
    e.stopPropagation();

    const piece = e.target.closest('.image-container').querySelector('.piece');

    let r = parseFloat(piece.dataset.r || 0);

    if (e.shiftKey) {
      r -= 15;
    } else {
      r += 15;
    }

    piece.dataset.r = r;
    piece.style.transform = `rotate(${r}deg)`;

    startTimer();
  });
});

/* ÍCONE MUDA COM SHIFT */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Shift') {
    document.querySelectorAll('.rotate-button').forEach(btn => {
      btn.textContent = '↺';
    });
  }
});

document.addEventListener('keyup', (e) => {
  if (e.key === 'Shift') {
    document.querySelectorAll('.rotate-button').forEach(btn => {
      btn.textContent = '↻';
    });
  }
});

function nextPage() {
  window.location.href = "page4.html";
}

/* TUTORIAL SOME SUAVEMENTE */
setTimeout(() => {
  const t = document.getElementById("tutorial");
  if (t) t.style.opacity = "0.2";
}, 5000);
</script>

</body>
</html>
